name: Delivery

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  package:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            rid: win-x64
            output: artifacts/windows
          - name: macos
            os: macos-latest
            rid: osx-x64
            output: artifacts/macos
          - name: linux
            os: ubuntu-latest
            rid: linux-x64
            output: artifacts/linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga

      - name: Publish app
        shell: bash
        run: dotnet publish Praxis.Avalonia/Praxis.Avalonia.csproj -c Release -r ${{ matrix.rid }} --self-contained false -o ${{ matrix.output }} -v minimal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: praxis-${{ matrix.name }}
          path: ${{ matrix.output }}

  release:
    name: Create GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip artifacts per OS
        run: |
          cd artifacts
          for dir in praxis-*/; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            praxis-windows.zip
            praxis-macos.zip
            praxis-linux.zip
