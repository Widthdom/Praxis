name: Delivery

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  package:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            tfm: net10.0-windows10.0.19041.0
            rid: ""
            props: -p:WindowsPackageType=None
            output: artifacts/windows
          - name: maccatalyst
            os: macos-latest
            tfm: net10.0-maccatalyst
            rid: maccatalyst-x64
            props: -p:EnableCodeSigning=false -p:CodesignRequireProvisioningProfile=false
            output: artifacts/maccatalyst

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Initialize Xcode
        if: matrix.name == 'maccatalyst'
        run: sudo xcodebuild -runFirstLaunch

      - name: Check Xcode compatibility (Mac Catalyst)
        id: xcode_check
        if: matrix.name == 'maccatalyst'
        shell: bash
        run: |
          set -euo pipefail
          XCODE_VERSION="$(xcodebuild -version | awk '/Xcode/ {print $2}')"
          echo "Detected Xcode: ${XCODE_VERSION}"
          MAJOR="$(echo "${XCODE_VERSION}" | cut -d. -f1)"
          MINOR="$(echo "${XCODE_VERSION}" | cut -d. -f2)"
          if [[ "${MAJOR}" -gt 26 ]] || [[ "${MAJOR}" -eq 26 && "${MINOR}" -ge 2 ]]; then
            echo "compatible=true" >> "$GITHUB_OUTPUT"
          else
            echo "compatible=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Mac Catalyst publish. .NET 10 MAUI requires Xcode 26.2+, runner has Xcode ${XCODE_VERSION}."
          fi

      - name: Publish app
        if: matrix.name != 'maccatalyst' || steps.xcode_check.outputs.compatible == 'true'
        shell: bash
        run: |
          RID_FLAG=""
          if [ -n "${{ matrix.rid }}" ]; then
            RID_FLAG="-r ${{ matrix.rid }}"
          fi
          dotnet publish Praxis/Praxis.csproj -c Release -f ${{ matrix.tfm }} $RID_FLAG -o ${{ matrix.output }} -v minimal ${{ matrix.props }}

      - name: Mac publish skipped
        if: matrix.name == 'maccatalyst' && steps.xcode_check.outputs.compatible != 'true'
        run: |
          mkdir -p ${{ matrix.output }}
          echo "Skipped due to runner Xcode version." > ${{ matrix.output }}/SKIPPED.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: praxis-${{ matrix.name }}
          path: ${{ matrix.output }}

  release:
    name: Create GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip artifacts per OS
        run: |
          cd artifacts
          for dir in praxis-*/; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            praxis-windows.zip
            praxis-maccatalyst.zip
