name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  core-tests:
    name: Core Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga

      - name: Restore tests
        run: dotnet restore Praxis.Tests/Praxis.Tests.csproj

      - name: Run tests
        run: >
          dotnet test Praxis.Tests/Praxis.Tests.csproj -c Release --no-restore -v minimal
          --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: praxis-test-coverage-cobertura
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: error

  desktop-build:
    name: Avalonia Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest
          - name: linux
            os: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga

      - name: Build Avalonia app
        run: dotnet build Praxis.Avalonia/Praxis.Avalonia.csproj -c Release -v minimal
