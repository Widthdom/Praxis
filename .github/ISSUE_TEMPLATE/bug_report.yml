name: Bug report / バグ報告
description: Report a reproducible problem with Praxis / Praxis の再現可能な不具合を報告する
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please avoid private paths, customer data, proprietary binaries, tokens, and exploit details in public issues.
        公開 issue には private なパス、顧客データ、プロプライエタリなバイナリ、トークン、攻撃詳細を書かないでください。
  - type: input
    id: summary
    attributes:
      label: Summary / 要約
      placeholder: Short, specific description / 短く具体的に
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps / 再現手順
      placeholder: Exact steps inside Praxis (button setup, command, key sequence) and sanitized inputs / Praxis 内での具体的手順（ボタン構成、コマンド、キー操作）と匿名化した入力
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / バージョン
      placeholder: Praxis app version (Help / About) and OS / Praxis のバージョン（ヘルプ / バージョン情報）と OS
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected / 期待値
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual / 実際
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check / プライバシー確認
      options:
        - label: I have removed private paths, customer data, proprietary binaries, tokens, and exploit details. / private なパス、顧客データ、プロプライエタリなバイナリ、トークン、攻撃詳細を削除しました。
          required: true
